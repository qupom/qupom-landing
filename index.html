<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qupom - Poupa dinheiro todos os dias</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-gray-900">

  <!-- HERO -->
  <section class="text-center py-20 px-6">
    <h1 class="text-4xl font-bold mb-4">
      Poupa dinheiro todos os dias com Qupom
    </h1>
    <p class="text-lg mb-6">
      Cupões exclusivos perto de ti. Simples, rápido e sem complicações.
    </p>
    <button class="bg-black text-white px-6 py-3 rounded-xl">
      Entrar em Early Access
    </button>
  </section>

  <!-- BENEFÍCIOS -->
  <section class="py-16 px-6 bg-gray-100">
    <div class="max-w-4xl mx-auto grid md:grid-cols-3 gap-6 text-center">
      <div>
        <h3 class="font-bold text-xl mb-2">📍 Local</h3>
        <p>Descobre cupões perto de ti</p>
      </div>
      <div>
        <h3 class="font-bold text-xl mb-2">🔒 Seguro</h3>
        <p>QR code único por utilizador</p>
      </div>
      <div>
        <h3 class="font-bold text-xl mb-2">⚡ Rápido</h3>
        <p>Usa em segundos na loja</p>
      </div>
    </div>
  </section>

  <!-- CALL TO ACTION -->
  <section class="text-center py-20 px-6">
    <h2 class="text-2xl font-bold mb-4">
      Queres acesso antes de todos?
    </h2>
    <input 
      type="email" 
      placeholder="O teu email"
      class="border px-4 py-2 rounded-lg mr-2"
    >
    <button class="bg-black text-white px-6 py-2 rounded-lg">
      Registar
    </button>
  </section>

</body>
</html>
